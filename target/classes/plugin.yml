name: YoChat
description: "The new best free chat plugin for Minecraft servers"
prefix: YoChat
version: '1.1.0'

main: me.tyyni.yoChat.yoChatPlugin.YoChat
api-version: '1.21.11'
load: STARTUP

softdepend: [ PlaceholderAPI, Vault, LuckPerms ]
authors: [ Tyyni ]

commands:
  yochat:
    description: Main command for YoChat plugin. Use /yochat help for more information.
    usage: /yochat <subcommand>

permissions:
    yochat:
        default: false
        description: Permission for using the main YoChat command and its subcommands.
        children:
          yochat.commands:
            description: Permission for the commands in YoChat.
            children:
              yochat.commands.reload:
                description: Permission for reloading the YoChat plugin configuration.

              yochat.commands.channels:
                description: Permission for managing chat channels in YoChat.
                children:
                 yochat.commands.channels.delete:
                   description: Permission for deleting chat channels.
                 yochat.commands.channels.create:
                   description: Permission for creating chat channels.
                 yochat.commands.channels.list:
                   description: Permission for seeing a list of chat channels.
                 yochat.commands.channels.join:
                   description: Permission for joining chat channels.
                 yochat.commands.channels.edit:
                   description: Permission for editing chat channels.
                 yochat.commands.channels.leave:
                   description: Permission for leaving chat channels.
                 yochat.commands.channels.members:
                   description: Permission for chat channels member handling.
                 yochat.commands.channels.info:
                   description: Permission for seeing info about channels.

              yochat.commands.help:
                description: Permission for the help command.

              yochat.commands.debug:
                description: Permission for debug commands.
                children:
                    yochat.commands.debug.pipeline:
                        description: Permission for debugging the chat pipeline.
              yochat.commands.mute:
                description: Permission for the mute command.
              yochat.commands.unmute:
                description: Permission for the unmute command.

          yochat.tabcomplete:
                description: Permission for tab completing in the commands of YoChat.
